name: Unity Tests

on:
  pull_request:
    branches:
      - development
      - main

permissions:
  contents: read
  checks: write

jobs:
  validate-source:
    runs-on: ubuntu-latest

    steps:
      - name: Require development branch
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$BASE_BRANCH" == "main" && "$HEAD_BRANCH" != "development" ]]; then
            echo "Main przyjmuje zmiany tylko z development."
            exit 1
          fi

  unity-tests:
    needs: validate-source
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        testMode: [EditMode, PlayMode]

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run Unity tests
        id: tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.3.14f1
          testMode: ${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity ${{ matrix.testMode }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-${{ matrix.testMode }}-results
          path: ${{ steps.tests.outputs.artifactsPath }}
          retention-days: 7
