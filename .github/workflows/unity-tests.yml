name: Unity Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  validate-source:
    name: Validate source branch
    runs-on: ubuntu-latest

    steps:
      - name: Allow only development
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_BRANCH" != "development" ]]; then
            echo "Main przyjmuje Pull Requesty tylko z development."
            exit 1
          fi

  unity-tests:
    name: Unity ${{ matrix.testMode }}
    needs: validate-source
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        testMode:
          - EditMode
          - PlayMode

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run Unity tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.3.14f1
          testMode: ${{ matrix.testMode }}
          artifactsPath: artifacts/${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity ${{ matrix.testMode }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-${{ matrix.testMode }}-results
          path: artifacts/${{ matrix.testMode }}
          retention-days: 7